name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main

permissions:
  contents: write      # 매니페스트 태그 갱신 커밋을 push 하려면 write 필요
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -t ghcr.io/hyun326/lion_first-backend:${{ github.sha }} \
            -t ghcr.io/hyun326/lion_first-backend:latest \
            -f paprika/backend/Dockerfile \
            paprika/backend

      - name: Push backend image
        run: |
          docker push ghcr.io/hyun326/lion_first-backend:${{ github.sha }}
          docker push ghcr.io/hyun326/lion_first-backend:latest

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://paprika-api.coder-han.com \
            --build-arg NEXT_PUBLIC_WS_URL=https://paprika-api.coder-han.com \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }} \
            -t ghcr.io/hyun326/lion_first-frontend:${{ github.sha }} \
            -t ghcr.io/hyun326/lion_first-frontend:latest \
            -f paprika/frontend/Dockerfile \
            paprika/frontend

      - name: Push frontend image
        run: |
          docker push ghcr.io/hyun326/lion_first-frontend:${{ github.sha }}
          docker push ghcr.io/hyun326/lion_first-frontend:latest

      # 빌드한 이미지의 SHA 태그를 매니페스트에 써넣고 git에 커밋·push
      # → ArgoCD가 매니페스트 변경을 감지해 자동 배포
      # [skip ci] 로 이 커밋이 워크플로를 다시 트리거하지 않게 함(무한루프 방지)
      - name: Update manifest image tags
        run: |
          sed -i "s|lion_first-backend:.*|lion_first-backend:${{ github.sha }}|" k8s/paprika-backend.yaml
          sed -i "s|lion_first-frontend:.*|lion_first-frontend:${{ github.sha }}|" k8s/paprika-frontend.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/paprika-backend.yaml k8s/paprika-frontend.yaml
          git commit -m "chore: bump image tag to ${{ github.sha }} [skip ci]" || echo "no changes to commit"
          git push origin HEAD:main
